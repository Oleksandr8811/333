<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Відомі актори</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

h1{
margin-top:30px;
}

.container{
display:flex;
justify-content:center;
gap:40px;
margin-top:40px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
width:250px;
}

.card img{
width:100%;
border-radius:10px;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#007BFF;
color:white;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>
</head>

<body>

<h1>Найвідоміші актори</h1>

<div class="container">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Leonardo_DiCaprio_2014.jpg">
<h2>Leonardo DiCaprio</h2>
<button onclick="info1()">Інформація</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Robert_Downey_Jr_2014_Comic_Con.jpg">
<h2>Robert Downey Jr.</h2>
<button onclick="info2()">Інформація</button>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Tom_Holland_by_Gage_Skidmore.jpg">
<h2>Tom Holland</h2>
<button onclick="info3()">Інформація</button>
</div>

</div>

<script>

function info1(){
alert("Leonardo DiCaprio — американський актор, відомий за фільмами 'Titanic', 'Inception', 'The Wolf of Wall Street'. Лауреат премії Оскар.");
}

function info2(){
alert("Robert Downey Jr. — американський актор, найбільш відомий роллю Тоні Старка (Iron Man) у фільмах Marvel.");
}

function info3(){
alert("Tom Holland — британський актор, який зіграв Людину-павука у фільмах Marvel.");
}

</script>

</body>
</html>
